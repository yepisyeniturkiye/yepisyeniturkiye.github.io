  # === Curator Feeds (recovery lane for uncovered sources) ===
  - id: oc-portal
    name: The OC Portal
    homepage: https://www.inoreader.com/stream/user/1003877176/tag/The%20OC%20Portal/view/html?cs=m
    feed_url: https://www.inoreader.com/stream/user/1003877176/tag/The%20OC%20Portal/view/html?cs=m
    feed_type: inoreader_html_playwright
    category: curator
    region: global
    language: multi
    status: live
    notes: |
      Consolidated curator feed owned by a Yepisyeni Türkiye follower (user id 1003877176).
      RSS export is gated behind Inoreader Pro; HTML view is public but requires a real browser
      to render (headless Playwright, not curl). Phase 2 fetcher must:
        1. Navigate via Playwright to the feed_url
        2. Scroll/paginate to load full item set (initial viewport shows ~21, feed has ~170+)
        3. Extract items from .article_magazine_content_wraper selectors
        4. Dedup by canonical article URL (Inoreader renders duplicate wrappers for the same item)
        5. Normalize to {title, url, source, pubDate}
      Observed publishers in initial viewport (2026-04-20): commondreams.org, truthout.org,
      therealnews.com, peoplesworld.org, wsws.org, jacobin.com, thenation.com,
      youtube.com (BreakThrough shorts). Full publisher set requires full-feed scrape.
      Acts as de-facto ingest lane for sources without direct RSS (wsws, in-these-times,
      new-frame, possibly resumen-latinoamericano, newsclick, others). Items whose publisher
      already has a direct feed should be deduped against that feed's output.
    last_verified: 2026-04-20

